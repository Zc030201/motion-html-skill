<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 入门 - 可交互 3D 能力跃迁模型</title>
  <style>
    :root {
      --bg: #eef4fb;
      --panel: rgba(255, 255, 255, 0.78);
      --ink: #13223a;
      --muted: #65758c;
      --line: rgba(117, 143, 174, 0.35);
      --blue: #2378ff;
      --cyan: #18b9d3;
      --violet: #7865e8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      font-family: "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 72% 18%, rgba(38, 137, 255, 0.18), transparent 30%),
        radial-gradient(circle at 22% 84%, rgba(30, 190, 216, 0.16), transparent 28%),
        linear-gradient(135deg, #f7fbff 0%, #e8f0fa 52%, #dfe9f6 100%);
    }

    #app {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: fixed;
      left: 42px;
      top: 36px;
      width: 410px;
      padding: 24px 26px 22px;
      border: 1px solid rgba(160, 179, 203, 0.42);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(75, 102, 140, 0.20);
      backdrop-filter: blur(18px);
      pointer-events: none;
    }

    .eyebrow {
      margin-bottom: 12px;
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #5d6f87;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 800;
    }

    .lead {
      margin: 16px 0 0;
      max-width: 340px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.72;
    }

    .chips {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .chip {
      min-height: 72px;
      padding: 12px 10px;
      border-radius: 16px;
      background: rgba(247, 250, 255, 0.88);
      border: 1px solid rgba(174, 190, 211, 0.45);
    }

    .chip strong {
      display: block;
      color: var(--blue);
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0;
    }

    .chip span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .controls {
      position: fixed;
      right: 38px;
      top: 34px;
      display: flex;
      gap: 10px;
      padding: 8px;
      border-radius: 18px;
      border: 1px solid rgba(160, 179, 203, 0.42);
      background: rgba(255, 255, 255, 0.66);
      box-shadow: 0 18px 46px rgba(83, 112, 148, 0.16);
      backdrop-filter: blur(16px);
    }

    button {
      height: 38px;
      padding: 0 14px;
      border: 0;
      border-radius: 12px;
      color: var(--ink);
      background: rgba(242, 247, 253, 0.94);
      font: 700 12px/1 "Noto Sans SC", "Microsoft YaHei", sans-serif;
      cursor: pointer;
    }

    button.active {
      color: white;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      box-shadow: 0 10px 26px rgba(35, 120, 255, 0.24);
    }

    .insight-stack {
      position: fixed;
      right: 42px;
      bottom: 38px;
      width: 348px;
      pointer-events: none;
    }

    .insight-card {
      position: relative;
      margin-top: 10px;
      padding: 15px 16px 14px;
      border: 1px solid rgba(160, 179, 203, 0.42);
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.88), rgba(241,247,255,.70)),
        radial-gradient(circle at 85% 20%, rgba(35,120,255,.16), transparent 36%);
      box-shadow: 0 18px 50px rgba(83, 112, 148, 0.15);
      backdrop-filter: blur(16px);
      overflow: hidden;
      transform: translateX(20px);
      opacity: 0;
      animation: insightIn 760ms cubic-bezier(.18,.74,.2,1) forwards;
      animation-delay: calc(var(--i, 0) * 160ms + 500ms);
    }

    .insight-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(var(--blue), var(--cyan));
    }

    .insight-card b {
      display: block;
      margin-bottom: 7px;
      color: var(--ink);
      font-size: 14px;
    }

    .insight-card span {
      display: block;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }

    .insight-meter {
      display: block;
      height: 4px;
      margin-top: 11px;
      border-radius: 999px;
      background: rgba(142, 163, 190, .22);
      overflow: hidden;
    }

    .insight-meter i {
      display: block;
      height: 100%;
      width: var(--w, 60%);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      animation: meterFill 1300ms cubic-bezier(.18,.74,.2,1) forwards;
      transform-origin: left;
      transform: scaleX(0);
    }

    @keyframes insightIn {
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes meterFill {
      to { transform: scaleX(1); }
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      padding: 10px 15px;
      border: 1px solid rgba(160, 179, 203, 0.42);
      border-radius: 999px;
      color: #5e7088;
      background: rgba(255, 255, 255, 0.70);
      box-shadow: 0 14px 38px rgba(83, 112, 148, 0.12);
      font-size: 12px;
      backdrop-filter: blur(14px);
      pointer-events: none;
    }

    .label {
      position: fixed;
      z-index: 3;
      transform: translate(-50%, -50%);
      padding: 7px 10px;
      border: 1px solid rgba(160, 179, 203, 0.48);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      box-shadow: 0 12px 30px rgba(75, 102, 140, 0.14);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      pointer-events: none;
      backdrop-filter: blur(10px);
    }

    .tooltip {
      position: fixed;
      z-index: 6;
      min-width: 190px;
      padding: 13px 14px;
      border: 1px solid rgba(128, 151, 179, 0.45);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.90);
      box-shadow: 0 22px 70px rgba(61, 87, 124, 0.24);
      transform: translate(16px, 16px);
      pointer-events: none;
      display: none;
      backdrop-filter: blur(18px);
    }

    .tooltip b {
      display: block;
      margin-bottom: 7px;
      font-size: 14px;
      color: var(--ink);
    }

    .tooltip span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    @media (max-width: 900px) {
      .hud { left: 20px; top: 22px; width: 330px; padding: 18px; }
      h1 { font-size: 30px; }
      .insight-stack { display: none; }
      .controls { right: 18px; top: 18px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <section class="hud">
    <div class="eyebrow">AI TRAINING / INTERACTIVE MODEL</div>
    <h1>AI 发展<br />能力跃迁模型</h1>
    <p class="lead">把“使用规模、任务复杂度、自主程度”放进同一个三维坐标里，展示从专用 AI 到大模型，再到 Agent 协作的变化。</p>
    <div class="chips">
      <div class="chip"><strong>900M+</strong><span>ChatGPT 周活跃用户</span></div>
      <div class="chip"><strong>18B</strong><span>每周消息量</span></div>
      <div class="chip"><strong>62%</strong><span>组织试验 Agent</span></div>
    </div>
  </section>

  <nav class="controls" aria-label="模型视角">
    <button id="view-growth" class="active">扩散视角</button>
    <button id="view-agent">Agent 视角</button>
    <button id="view-top">俯视结构</button>
  </nav>

  <aside class="insight-stack">
    <div class="insight-card" style="--i:0"><b>扩散不是线性增长</b><span>用户规模越大，模型越容易进入更多工作流程。</span><em class="insight-meter" style="--w:78%"><i></i></em></div>
    <div class="insight-card" style="--i:1"><b>Agent 是下一层能力</b><span>从“回答问题”进入“规划、调用工具、检查结果”。</span><em class="insight-meter" style="--w:62%"><i></i></em></div>
    <div class="insight-card" style="--i:2"><b>人仍然是验收节点</b><span>越自动化，越需要权限边界和人工确认。</span><em class="insight-meter" style="--w:86%"><i></i></em></div>
  </aside>

  <div class="hint">拖动旋转 · 滚轮缩放 · 悬停节点看数据</div>
  <div id="tooltip" class="tooltip"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";

    const app = document.querySelector("#app");
    const tooltip = document.querySelector("#tooltip");

    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 120);
    camera.position.set(8.7, 5.2, 8.4);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 5.5;
    controls.maxDistance = 17;
    controls.maxPolarAngle = Math.PI * 0.47;
    controls.target.set(3.05, 1.35, 0.55);

    const root = new THREE.Group();
    root.position.set(1.65, 0, -0.18);
    scene.add(root);

    const colors = {
      ink: 0x13223a,
      grid: 0x9db0c7,
      blue: 0x2378ff,
      cyan: 0x18b9d3,
      violet: 0x7865e8,
      white: 0xffffff,
      panel: 0xeaf2fb,
      grey: 0xb8c7d9
    };

    const data = [
      {
        id: "specialized",
        title: "专用 AI",
        year: "2016-2020",
        x: -3.2, y: 0.55, z: -1.55,
        scale: "推荐 / 识别",
        task: "单任务优化",
        autonomy: "低",
        value: 100,
        color: colors.grey
      },
      {
        id: "llm",
        title: "大模型",
        year: "2023",
        x: -0.85, y: 1.55, z: -0.45,
        scale: "100M+",
        task: "跨任务生成",
        autonomy: "中",
        value: 300,
        color: colors.blue
      },
      {
        id: "mass",
        title: "大众入口",
        year: "2025",
        x: 1.75, y: 2.52, z: 0.62,
        scale: "700M / 18B",
        task: "学习、写作、分析",
        autonomy: "中高",
        value: 720,
        color: colors.cyan
      },
      {
        id: "agent",
        title: "Agent 协作",
        year: "2026+",
        x: 4.28, y: 3.30, z: 1.92,
        scale: "62% 组织试点",
        task: "规划 + 工具 + 执行",
        autonomy: "高",
        value: 900,
        color: colors.violet
      }
    ];

    const interactive = [];
    const labels = [];

    const ambient = new THREE.HemisphereLight(0xffffff, 0xc7d5e7, 2.25);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 2.2);
    sun.position.set(-3.5, 8, 5);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    scene.add(sun);

    const side = new THREE.DirectionalLight(0x72d7ff, 0.9);
    side.position.set(6, 3, -6);
    scene.add(side);

    function makeMaterial(color, roughness = 0.58, metalness = 0.15, opacity = 1) {
      return new THREE.MeshPhysicalMaterial({
        color,
        roughness,
        metalness,
        transparent: opacity < 1,
        opacity,
        clearcoat: 0.45,
        clearcoatRoughness: 0.35
      });
    }

    function roundedBox(w, h, d, r = 0.06, s = 4) {
      const shape = new THREE.Shape();
      const x = -w / 2, y = -h / 2;
      shape.moveTo(x + r, y);
      shape.lineTo(x + w - r, y);
      shape.quadraticCurveTo(x + w, y, x + w, y + r);
      shape.lineTo(x + w, y + h - r);
      shape.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      shape.lineTo(x + r, y + h);
      shape.quadraticCurveTo(x, y + h, x, y + h - r);
      shape.lineTo(x, y + r);
      shape.quadraticCurveTo(x, y, x + r, y);
      return new THREE.ExtrudeGeometry(shape, {
        depth: d,
        bevelEnabled: true,
        bevelSegments: s,
        steps: 1,
        bevelSize: r * 0.48,
        bevelThickness: r * 0.48
      }).center();
    }

    function lineBetween(a, b, color, opacity = 0.72, width = 0.028) {
      const dir = new THREE.Vector3().subVectors(b, a);
      const len = dir.length();
      const geom = new THREE.CylinderGeometry(width, width, len, 14);
      const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.copy(a).add(b).multiplyScalar(0.5);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize());
      return mesh;
    }

    function addTextLabel(text, object, offset = new THREE.Vector3(0, 0.54, 0)) {
      const el = document.createElement("div");
      el.className = "label";
      el.textContent = text;
      document.body.appendChild(el);
      labels.push({ el, object, offset });
    }

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(10.4, 6.2, 1, 1),
      new THREE.MeshStandardMaterial({
        color: 0xf7fbff,
        roughness: 0.82,
        metalness: 0.0
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.set(0.6, -0.035, 0.28);
    floor.receiveShadow = true;
    root.add(floor);

    const grid = new THREE.GridHelper(10, 10, colors.grid, colors.grid);
    grid.material.transparent = true;
    grid.material.opacity = 0.28;
    grid.position.set(0.6, 0.0, 0.28);
    root.add(grid);

    const particleCount = 180;
    const particlePositions = new Float32Array(particleCount * 3);
    const particleSeeds = [];
    for (let i = 0; i < particleCount; i++) {
      const t = i / particleCount;
      particleSeeds.push(t);
      particlePositions[i * 3] = -4.2 + t * 9.2 + Math.sin(i * 2.1) * 0.24;
      particlePositions[i * 3 + 1] = 0.35 + Math.sin(i * 0.9) * 0.55;
      particlePositions[i * 3 + 2] = -2.2 + Math.cos(i * 1.7) * 2.2;
    }
    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute("position", new THREE.BufferAttribute(particlePositions, 3));
    const particleField = new THREE.Points(
      particleGeometry,
      new THREE.PointsMaterial({
        color: colors.blue,
        size: 0.035,
        transparent: true,
        opacity: 0.46,
        depthWrite: false
      })
    );
    root.add(particleField);

    const axisGroup = new THREE.Group();
    root.add(axisGroup);
    axisGroup.add(lineBetween(new THREE.Vector3(-4.5, 0.02, -2.5), new THREE.Vector3(5.3, 0.02, -2.5), colors.blue, 0.45, 0.018));
    axisGroup.add(lineBetween(new THREE.Vector3(-4.5, 0.02, -2.5), new THREE.Vector3(-4.5, 3.95, -2.5), colors.cyan, 0.45, 0.018));
    axisGroup.add(lineBetween(new THREE.Vector3(-4.5, 0.02, -2.5), new THREE.Vector3(-4.5, 0.02, 2.75), colors.violet, 0.45, 0.018));

    const ribbonPoints = data.map(d => new THREE.Vector3(d.x, d.y, d.z));
    const curve = new THREE.CatmullRomCurve3(ribbonPoints, false, "catmullrom", 0.45);
    const tube = new THREE.Mesh(
      new THREE.TubeGeometry(curve, 96, 0.045, 18, false),
      new THREE.MeshBasicMaterial({ color: colors.blue, transparent: true, opacity: 0.88 })
    );
    root.add(tube);

    const glowTube = new THREE.Mesh(
      new THREE.TubeGeometry(curve, 96, 0.105, 18, false),
      new THREE.MeshBasicMaterial({ color: colors.cyan, transparent: true, opacity: 0.12 })
    );
    root.add(glowTube);

    data.forEach((d, i) => {
      const baseHeight = Math.max(0.45, d.value / 250);
      const base = new THREE.Mesh(
        roundedBox(1.35, 0.16, 0.88, 0.08, 5),
        makeMaterial(0xffffff, 0.55, 0.02, 0.86)
      );
      base.position.set(d.x, 0.12, d.z);
      base.castShadow = true;
      base.receiveShadow = true;
      root.add(base);

      const column = new THREE.Mesh(
        roundedBox(0.50, baseHeight, 0.50, 0.10, 6),
        makeMaterial(d.color, 0.42, 0.22, 0.88)
      );
      column.position.set(d.x, baseHeight / 2 + 0.25, d.z);
      column.castShadow = true;
      column.receiveShadow = true;
      column.userData = d;
      root.add(column);
      interactive.push(column);

      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.20 + i * 0.025, 42, 42),
        makeMaterial(d.color, 0.30, 0.18, 0.96)
      );
      sphere.position.set(d.x, d.y, d.z);
      sphere.castShadow = true;
      sphere.userData = d;
      root.add(sphere);
      interactive.push(sphere);

      const vertical = lineBetween(
        new THREE.Vector3(d.x, 0.22, d.z),
        new THREE.Vector3(d.x, d.y - 0.08, d.z),
        d.color,
        0.24,
        0.014
      );
      root.add(vertical);

      const footprint = new THREE.Mesh(
        new THREE.RingGeometry(0.38, 0.48, 44),
        new THREE.MeshBasicMaterial({ color: d.color, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
      );
      footprint.rotation.x = -Math.PI / 2;
      footprint.position.set(d.x, 0.035, d.z);
      root.add(footprint);

      addTextLabel(`${d.title} · ${d.year}`, sphere, new THREE.Vector3(0, 0.46, 0));
    });

    const panels = [
      { x: -3.2, w: 1.4, color: 0xd9e4f1 },
      { x: -0.85, w: 1.52, color: 0xe5f0ff },
      { x: 1.75, w: 1.68, color: 0xe0f8fb },
      { x: 4.28, w: 1.82, color: 0xe9e7ff }
    ];

    panels.forEach(p => {
      const mesh = new THREE.Mesh(
        roundedBox(p.w, 0.025, 5.00, 0.04, 3),
        new THREE.MeshBasicMaterial({ color: p.color, transparent: true, opacity: 0.36 })
      );
      mesh.position.set(p.x, 0.045, 0.22);
      root.add(mesh);
    });

    function makeCanvasText(text, width = 560, height = 160, size = 42) {
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#5d6f87";
      ctx.font = `700 ${size}px "Microsoft YaHei", sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, width / 2, height / 2);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.72 });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(width / 180, height / 180, 1);
      return sprite;
    }

    const xLabel = makeCanvasText("使用规模", 420, 120, 38);
    xLabel.position.set(5.35, 0.23, -2.66);
    root.add(xLabel);
    const yLabel = makeCanvasText("任务复杂度", 460, 120, 38);
    yLabel.position.set(-4.72, 4.18, -2.42);
    root.add(yLabel);
    const zLabel = makeCanvasText("自主程度", 420, 120, 38);
    zLabel.position.set(-4.72, 0.28, 2.94);
    root.add(zLabel);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2(-10, -10);
    let hovered = null;

    function onPointerMove(event) {
      pointer.x = (event.clientX / innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / innerHeight) * 2 + 1;
      tooltip.style.left = `${event.clientX}px`;
      tooltip.style.top = `${event.clientY}px`;
    }

    function onPointerLeave() {
      pointer.set(-10, -10);
      hovered = null;
      tooltip.style.display = "none";
      document.body.style.cursor = "default";
    }

    renderer.domElement.addEventListener("pointermove", onPointerMove);
    renderer.domElement.addEventListener("pointerleave", onPointerLeave);

    function setView(name) {
      document.querySelectorAll("button").forEach(btn => btn.classList.remove("active"));
      document.querySelector(`#view-${name}`).classList.add("active");
      const views = {
        growth: { pos: [8.7, 5.2, 8.4], target: [3.05, 1.35, 0.55] },
        agent: { pos: [6.35, 4.2, 6.0], target: [4.80, 2.0, 1.02] },
        top: { pos: [1.9, 9.8, 0.0], target: [1.9, 0.2, -0.08] }
      };
      const view = views[name];
      camera.position.set(...view.pos);
      controls.target.set(...view.target);
      controls.update();
    }

    document.querySelector("#view-growth").addEventListener("click", () => setView("growth"));
    document.querySelector("#view-agent").addEventListener("click", () => setView("agent"));
    document.querySelector("#view-top").addEventListener("click", () => setView("top"));

    function updateLabels() {
      labels.forEach(({ el, object, offset }) => {
        const pos = new THREE.Vector3();
        object.getWorldPosition(pos);
        pos.add(offset);
        pos.project(camera);
        const visible = pos.z < 1;
        el.style.display = visible ? "block" : "none";
        el.style.left = `${(pos.x * 0.5 + 0.5) * innerWidth}px`;
        el.style.top = `${(-pos.y * 0.5 + 0.5) * innerHeight}px`;
      });
    }

    function animate(time) {
      requestAnimationFrame(animate);
      controls.update();

      tube.material.opacity = 0.78 + Math.sin(time * 0.002) * 0.08;
      glowTube.material.opacity = 0.12 + Math.sin(time * 0.002 + 1.2) * 0.035;
      const pos = particleGeometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        const base = particleSeeds[i];
        const k = (base + time * 0.000045) % 1;
        pos[i * 3] = -4.2 + k * 9.2 + Math.sin(time * 0.0012 + i) * 0.18;
        pos[i * 3 + 1] = 0.35 + Math.sin(time * 0.0015 + i * 0.21) * 0.50 + k * 1.8;
        pos[i * 3 + 2] = -2.2 + Math.cos(time * 0.001 + i * 0.37) * 2.1;
      }
      particleGeometry.attributes.position.needsUpdate = true;

      raycaster.setFromCamera(pointer, camera);
      const hit = raycaster.intersectObjects(interactive, false)[0];
      if (hit) {
        hovered = hit.object.userData;
        tooltip.innerHTML = `<b>${hovered.title} · ${hovered.year}</b><span>规模：${hovered.scale}</span><span>任务：${hovered.task}</span><span>自主程度：${hovered.autonomy}</span>`;
        tooltip.style.display = "block";
        document.body.style.cursor = "grab";
      } else if (hovered) {
        hovered = null;
        tooltip.style.display = "none";
        document.body.style.cursor = "default";
      }

      updateLabels();
      renderer.render(scene, camera);
    }

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    animate(0);
  </script>
</body>
</html>
