<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="motion-deck animated landing demo with bilingual interface" />
    <title>motion-deck 交互演示</title>
    <style>
      :root {
        --bg: #060d1a;
        --ink: #eaf5ff;
        --muted: rgba(226, 239, 255, 0.72);
        --line: rgba(130, 204, 255, 0.28);
        --cyan: #56d9ff;
        --blue: #4e87ff;
        --violet: #9b7fff;
        --panel: rgba(9, 18, 38, 0.62);
      }

      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; }
      body {
        overflow: hidden;
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 22%, rgba(78, 135, 255, 0.17), transparent 40%),
          radial-gradient(circle at 80% 85%, rgba(155, 127, 255, 0.18), transparent 40%),
          linear-gradient(140deg, #060d1a 0%, #090f1e 45%, #050712 100%);
        color: var(--ink);
      }

      canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      .overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      .topbar {
        position: fixed;
        top: 20px;
        left: 24px;
        right: 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 5;
      }

      .badge {
        pointer-events: auto;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 14px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        font-size: 12px;
        color: var(--muted);
      }

      .lang-switch {
        pointer-events: auto;
        display: inline-flex;
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }

      .lang-switch button {
        appearance: none;
        border: 0;
        padding: 8px 14px;
        color: #d8eeff;
        background: transparent;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      .lang-switch button.active {
        background: rgba(78, 135, 255, 0.32);
      }

      .main {
        pointer-events: none;
        position: fixed;
        left: 24px;
        right: 24px;
        top: 92px;
        max-width: 900px;
        z-index: 3;
      }

      .title {
        margin: 0;
        font-size: clamp(34px, 6vw, 68px);
        line-height: 0.95;
        text-wrap: balance;
        letter-spacing: 0;
      }

      .title span {
        color: transparent;
        background: linear-gradient(90deg, #ffffff, var(--cyan), var(--blue), var(--violet));
        -webkit-background-clip: text;
        background-clip: text;
      }

      .subtitle {
        margin-top: 16px;
        max-width: 760px;
        color: var(--muted);
        line-height: 1.7;
        font-size: 16px;
      }

      .hint {
        margin-top: 16px;
        display: inline-block;
        border: 1px dashed rgba(130, 204, 255, 0.45);
        padding: 10px 12px;
        border-radius: 10px;
        color: rgba(222, 238, 255, 0.78);
        background: rgba(5, 13, 32, 0.36);
        font-size: 13px;
      }

      .links {
        position: fixed;
        top: 24px;
        right: 24px;
        display: grid;
        gap: 10px;
        width: min(340px, calc(100vw - 48px));
        z-index: 5;
      }

      .tile {
        pointer-events: auto;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        padding: 12px;
      }

      .tile h3 {
        margin: 0;
        font-size: 16px;
      }

      .tile p {
        margin: 8px 0 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .tile a {
        color: #b8e7ff;
        text-decoration: none;
        font-size: 13px;
        margin-right: 10px;
      }

      .tile a:hover {
        text-decoration: underline;
      }

      .legend {
        position: fixed;
        right: 24px;
        bottom: 20px;
        width: min(340px, calc(100vw - 48px));
        border: 1px solid var(--line);
        border-radius: 12px;
        z-index: 5;
        padding: 12px;
        background: rgba(5, 12, 26, 0.48);
        backdrop-filter: blur(12px);
      }

      .legend h4 {
        margin: 0;
        font-size: 13px;
        color: rgba(235, 246, 255, 0.86);
      }

      .legend-row {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .pill {
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 12px;
        border: 1px solid rgba(130, 204, 255, 0.28);
      }

      .status {
        position: fixed;
        left: 24px;
        bottom: 20px;
        color: var(--muted);
        font-size: 12px;
        z-index: 4;
      }

      @media (max-width: 980px) {
        .topbar { top: 12px; left: 14px; right: 14px; }
        .links, .legend { width: calc(100vw - 28px); }
        .links { right: 14px; top: 60px; width: 290px; }
        .legend { right: 14px; }
        .main { top: 96px; left: 14px; right: 14px; max-width: none; }
        .subtitle { font-size: 14px; }
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div class="overlay">
      <div class="topbar">
        <div class="badge" data-i="brand">AI 互动可视化样例</div>
        <div class="lang-switch" role="group" aria-label="language">
          <button class="active" data-lang="zh">中文</button>
          <button data-lang="en">English</button>
        </div>
      </div>
      <div class="main">
        <h1 class="title" data-i="title">
          <span>motion-deck</span> 交互演示
        </h1>
        <p class="subtitle" data-i="subtitle">这是默认中文界面，打开即看到高质感动态图。支持三维轨迹、粒子流和交互反馈，可直接用于演示页内嵌。</p>
        <div class="hint" data-i="hint">默认中文 · 鼠标拖拽可旋转视角，单击可放置“脉冲节点”</div>
      </div>
      <div class="links">
        <div class="tile">
          <h3 data-i="deckTitle">主课件</h3>
          <p data-i="deckDesc">完整 3D 互动课件，偏培训版本。</p>
          <a href="ai-training-html-deck.html" target="_blank" rel="noreferrer" data-i="deckLink">打开主课件</a>
        </div>
        <div class="tile">
          <h3 data-i="demoTitle">模块演示</h3>
          <p data-i="demoDesc">独立动效模块，便于复用到其他项目。</p>
          <a href="bili-inspired-growth-module.html" target="_blank" rel="noreferrer" data-i="demoLinkA">打开增长模块</a>
          <a href="bili-11-15-replica.html" target="_blank" rel="noreferrer" data-i="demoLinkB">打开 11-15 复刻</a>
        </div>
      </div>
      <aside class="legend">
        <h4 data-i="legendTitle">图例</h4>
        <div class="legend-row">
          <span class="pill" style="border-color: rgba(86,217,255,.75); color:#c9f1ff;" data-i="legendA">数据 (Data)</span>
          <span class="pill" style="border-color: rgba(158,127,255,.75); color:#dec6ff;" data-i="legendB">算力 (Compute)</span>
          <span class="pill" style="border-color: rgba(105,245,194,.75); color:#bdf6e2;" data-i="legendC">能力 (Capability)</span>
        </div>
      </aside>
      <div class="status" data-i="status">正在加载三维场景…</div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

      const i18n = {
        zh: {
          brand: "AI 互动可视化样例",
          title: "<span>motion-deck</span> 交互演示",
          subtitle: "这是默认中文界面，打开即看到高质感动态图。支持三维轨迹、粒子流和交互反馈，可直接用于演示页内嵌。",
          hint: "默认中文 · 鼠标拖拽可旋转视角，单击可放置“脉冲节点”。",
          deckTitle: "主课件",
          deckDesc: "完整 3D 互动课件，偏培训版本。",
          deckLink: "打开主课件",
          demoTitle: "模块演示",
          demoDesc: "独立动效模块，便于复用到其他项目。",
          demoLinkA: "打开增长模块",
          demoLinkB: "打开 11-15 复刻",
          legendTitle: "图例",
          legendA: "数据 (Data)",
          legendB: "算力 (Compute)",
          legendC: "能力 (Capability)",
          status: "正在加载三维场景…",
          statusReady: "就绪：单击可创建节点，滚轮可缩放，拖动可转动。"
        },
        en: {
          brand: "AI Motion Demo Lab",
          title: "<span>motion-deck</span> Interactive Demo",
          subtitle: "Chinese is the default mode. You get a high-end animated 3D scene immediately, with trajectory, particles, and interactive feedback.",
          hint: "Default Chinese, click to spawn pulse nodes, drag to rotate the camera.",
          deckTitle: "Main Deck",
          deckDesc: "Full 3D interactive deck for training-oriented storytelling.",
          deckLink: "Open Main Deck",
          demoTitle: "Demo Modules",
          demoDesc: "Reusable motion modules for other projects.",
          demoLinkA: "Open Growth Module",
          demoLinkB: "Open 11-15 Replica",
          legendTitle: "Legend",
          legendA: "Data",
          legendB: "Compute",
          legendC: "Capability",
          status: "Loading 3D scene…",
          statusReady: "Ready: click to emit a node, scroll to zoom, drag to orbit."
        }
      };

      const canvas = document.getElementById("scene");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x050814, 0.032);
      const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 120);
      camera.position.set(7.8, 4.8, 8.9);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.6;
      controls.minDistance = 4.6;
      controls.maxDistance = 24;
      controls.target.set(0, 1.2, 0);

      const renderPass = new RenderPass(scene, camera);
      const composer = new EffectComposer(renderer);
      composer.addPass(renderPass);
      const bloom = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        0.9,
        0.55,
        0.14
      );
      composer.addPass(bloom);

      scene.add(new THREE.AmbientLight(0xb7d8ff, 0.5));
      const keyLight = new THREE.DirectionalLight(0x69ecff, 1.9);
      keyLight.position.set(4, 8, 6);
      scene.add(keyLight);
      const fill = new THREE.PointLight(0xa879ff, 1.25, 30);
      fill.position.set(-3.5, 3.2, -2);
      scene.add(fill);

      const root = new THREE.Group();
      scene.add(root);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 18, 120, 120),
        new THREE.MeshStandardMaterial({
          color: 0x08172e,
          emissive: 0x041126,
          metalness: 0.2,
          roughness: 0.65,
          transparent: true,
          opacity: 0.86
        })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -0.95;
      root.add(floor);

      const grid = new THREE.GridHelper(18, 42, 0x2f76c7, 0x14324f);
      grid.material.opacity = 0.3;
      grid.material.transparent = true;
      grid.position.y = -0.95;
      root.add(grid);

      const timeline = [
        { year: 2012, label: "传统AI", value: 7, hue: 0.58 },
        { year: 2014, label: "语音识别", value: 15, hue: 0.56 },
        { year: 2017, label: "Transformer", value: 22, hue: 0.55 },
        { year: 2020, label: "ChatGPT", value: 40, hue: 0.53 },
        { year: 2022, label: "多模态", value: 58, hue: 0.49 },
        { year: 2024, label: "Agent", value: 75, hue: 0.45 },
        { year: 2026, label: "协同智能", value: 88, hue: 0.38 },
        { year: 2028, label: "闭环系统", value: 97, hue: 0.34 },
        { year: 2030, label: "企业共生", value: 106, hue: 0.31 }
      ];

      const curvePoints = timeline.map((step, i) => {
        const x = -7 + (i / (timeline.length - 1)) * 14;
        const y = 0.35 + Math.pow(step.value / 110, 1.45) * 4.1 + Math.sin(i * 1.1) * 0.18;
        const z = Math.sin(i * 0.8) * 1.3;
        return new THREE.Vector3(x, y, z);
      });

      const curve = new THREE.CatmullRomCurve3(curvePoints, false, "centripetal", 0.08);
      const tubeGeom = new THREE.TubeGeometry(curve, 220, 0.055, 12, false);
      const tube = new THREE.Mesh(
        tubeGeom,
        new THREE.MeshStandardMaterial({
          color: 0x4be6ff,
          emissive: 0x114977,
          emissiveIntensity: 0.5,
          metalness: 0.22,
          roughness: 0.25,
          transparent: true,
          opacity: 0.92
        })
      );
      root.add(tube);

      const glow = new THREE.Mesh(
        new THREE.TubeGeometry(curve, 220, 0.13, 16, false),
        new THREE.MeshBasicMaterial({
          color: 0x4f8eff,
          transparent: true,
          opacity: 0.22
        })
      );
      root.add(glow);

      const dots = new THREE.Group();
      const labelLayer = document.createElement("div");
      labelLayer.style.position = "fixed";
      labelLayer.style.inset = "0";
      labelLayer.style.pointerEvents = "none";
      document.body.appendChild(labelLayer);

      const labels = [];
      timeline.forEach((step, i) => {
        const point = curvePoints[i];
        const sphere = new THREE.Mesh(
          new THREE.IcosahedronGeometry(0.11, 1),
          new THREE.MeshStandardMaterial({
            color: new THREE.Color().setHSL(step.hue, 0.78, 0.68).getHex(),
            emissive: 0x183d6b,
            emissiveIntensity: 0.7,
            metalness: 0.45,
            roughness: 0.14
          })
        );
        sphere.position.copy(point);
        dots.add(sphere);

        const ring = new THREE.Mesh(
          new THREE.RingGeometry(0.16, 0.18, 40),
          new THREE.MeshBasicMaterial({ color: 0x9bd9ff, transparent: true, opacity: 0.7 })
        );
        ring.position.copy(point);
        ring.rotation.x = Math.PI / 2;
        dots.add(ring);

        const mark = document.createElement("div");
        mark.className = "milestone";
        mark.style.position = "absolute";
        mark.style.font = "700 11px 'JetBrains Mono', Consolas, monospace";
        mark.style.color = "rgba(231,246,255,.86)";
        mark.style.textShadow = "0 0 14px rgba(81,217,255,.6)";
        mark.style.transform = "translate(-50%, -50%)";
        mark.textContent = `${step.year} ${step.label}`;
        labelLayer.appendChild(mark);
        labels.push({ el: mark, point });
      });

      root.add(dots);

      const particleCount = 520;
      const pg = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const speeds = [];
      for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 16;
        positions[i * 3 + 1] = Math.random() * 6 + 0.5;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 8;
        speeds.push(0.004 + Math.random() * 0.015);
      }
      pg.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      const particles = new THREE.Points(
        pg,
        new THREE.PointsMaterial({
          size: 0.022,
          transparent: true,
          opacity: 0.55,
          color: 0x9de4ff,
          depthWrite: false
        })
      );
      root.add(particles);

      const nodes = [];
      function spawnPulse(xNorm) {
        const sphere = new THREE.Mesh(
          new THREE.SphereGeometry(0.14, 18, 18),
          new THREE.MeshStandardMaterial({
            color: 0xffffff,
            emissive: 0x7ad2ff,
            emissiveIntensity: 0.4,
            transparent: true,
            opacity: 0.95
          })
        );
        const seed = Math.random() * Math.PI * 2;
        const axisZ = (xNorm - 0.5) * 12;
        sphere.position.set(axisZ, 4.6, Math.sin(seed) * 2.2);
        sphere.userData = {
          v: new THREE.Vector3((Math.random() - 0.5) * 0.01, -0.013 - Math.random() * 0.012, (Math.random() - 0.5) * 0.01),
          life: 210,
          spin: Math.random() * 0.06 + 0.02
        };
        root.add(sphere);
        nodes.push(sphere);
      }

      const ui = {
        brand: document.querySelector("[data-i='brand']"),
        title: document.querySelector("[data-i='title']"),
        subtitle: document.querySelector("[data-i='subtitle']"),
        hint: document.querySelector("[data-i='hint']"),
        deckTitle: document.querySelector("[data-i='deckTitle']"),
        deckDesc: document.querySelector("[data-i='deckDesc']"),
        deckLink: document.querySelector("[data-i='deckLink']"),
        demoTitle: document.querySelector("[data-i='demoTitle']"),
        demoDesc: document.querySelector("[data-i='demoDesc']"),
        demoLinkA: document.querySelector("[data-i='demoLinkA']"),
        demoLinkB: document.querySelector("[data-i='demoLinkB']"),
        legendTitle: document.querySelector("[data-i='legendTitle']"),
        legendA: document.querySelector("[data-i='legendA']"),
        legendB: document.querySelector("[data-i='legendB']"),
        legendC: document.querySelector("[data-i='legendC']"),
        status: document.querySelector("[data-i='status']")
      };

      function applyLocale(locale) {
        const t = i18n[locale];
        ui.brand.textContent = t.brand;
        ui.title.innerHTML = t.title;
        ui.subtitle.textContent = t.subtitle;
        ui.hint.textContent = t.hint;
        ui.deckTitle.textContent = t.deckTitle;
        ui.deckDesc.textContent = t.deckDesc;
        ui.deckLink.textContent = t.deckLink;
        ui.demoTitle.textContent = t.demoTitle;
        ui.demoDesc.textContent = t.demoDesc;
        ui.demoLinkA.textContent = t.demoLinkA;
        ui.demoLinkB.textContent = t.demoLinkB;
        ui.legendTitle.textContent = t.legendTitle;
        ui.legendA.textContent = t.legendA;
        ui.legendB.textContent = t.legendB;
        ui.legendC.textContent = t.legendC;
        ui.status.textContent = t.statusReady;
      }

      function localizeInitial() {
        const current = localStorage.getItem("locale") || "zh";
        const langButtons = document.querySelectorAll(".lang-switch button");
        langButtons.forEach((button) => {
          const isActive = button.dataset.lang === current;
          button.classList.toggle("active", isActive);
          if (isActive) button.setAttribute("aria-pressed", "true");
          else button.setAttribute("aria-pressed", "false");
        });
        applyLocale(current);
      }

      document.querySelector(".lang-switch").addEventListener("click", (event) => {
        const button = event.target.closest("button[data-lang]");
        if (!button) return;
        const locale = button.dataset.lang;
        localStorage.setItem("locale", locale);
        localizeInitial();
      });

      localizeInitial();

      const clock = new THREE.Clock();
      function updateLabelPositions() {
        labels.forEach(({ el, point }) => {
          const projected = point.clone().project(camera);
          const visible = projected.z < 1;
          const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
          const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;
          el.style.left = `${x}px`;
          el.style.top = `${y}px`;
          el.style.opacity = visible ? "1" : "0";
        });
      }

      const ringMat = new THREE.MeshBasicMaterial({ color: 0x4f89ff, transparent: true, opacity: 0.55, side: THREE.DoubleSide });
      function animate() {
        const t = clock.getElapsedTime();
        controls.update();

        tube.material.color.setHSL(0.53 + Math.sin(t * 0.65) * 0.03, 0.86, 0.64);
        glow.rotation.z = Math.sin(t * 0.08) * 0.06;
        floor.material.opacity = 0.78 + Math.sin(t * 0.9) * 0.09;
        particles.rotation.y += 0.002;
        grid.rotation.z += 0.0003;

        const posAttr = particles.geometry.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
          posAttr[i * 3] += speeds[i];
          posAttr[i * 3 + 1] -= 0.0028 + Math.sin(t + i * 0.2) * 0.0008;
          posAttr[i * 3 + 2] += Math.cos(t * 0.6 + i) * 0.0004;
          if (posAttr[i * 3 + 1] < -0.6) {
            posAttr[i * 3 + 1] = Math.random() * 4.5 + 2.8;
            posAttr[i * 3] = (Math.random() - 0.5) * 16;
            posAttr[i * 3 + 2] = (Math.random() - 0.5) * 8;
          }
        }
        particles.geometry.attributes.position.needsUpdate = true;

        dots.children.forEach((obj, i) => {
          if (obj.material && obj.material.type === "MeshStandardMaterial") {
            const p = curvePoints[i % curvePoints.length];
            obj.position.y = p.y + Math.sin(t * 1.7 + i * 0.7) * 0.045;
            obj.rotation.y += 0.01;
          }
          if (obj.material && obj.material.type === "MeshBasicMaterial") {
            obj.material.opacity = 0.45 + Math.sin(t * 1.6 + i) * 0.16;
          }
        });

        nodes.forEach((node, i) => {
          node.position.add(node.userData.v);
          node.rotation.y += node.userData.spin;
          node.userData.life -= 1;
          const p = Math.max(node.userData.life / 210, 0);
          node.material.opacity = p * 0.95;
          node.scale.setScalar(0.75 + (1 - p) * 0.95);
        });
        for (let i = nodes.length - 1; i >= 0; i--) {
          if (nodes[i].userData.life <= 0) {
            root.remove(nodes[i]);
            nodes[i].geometry.dispose();
            nodes[i].material.dispose();
            nodes.splice(i, 1);
          }
        }

        updateLabelPositions();
        composer.render();
        requestAnimationFrame(animate);
      }

      const labelCss = document.createElement("style");
      labelCss.textContent = `
        .milestone {
          pointer-events: none;
          position: fixed;
          z-index: 8;
          padding: 2px 6px;
          border: 1px solid rgba(130, 204, 255, 0.18);
          border-radius: 8px;
          white-space: nowrap;
          background: rgba(4, 11, 24, 0.36);
          backdrop-filter: blur(6px);
          transition: opacity 0.18s ease;
        }
      `;
      document.head.appendChild(labelCss);

      renderer.domElement.addEventListener("click", (event) => {
        const xNorm = event.clientX / window.innerWidth;
        spawnPulse(xNorm);
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
    </script>
  </body>
</html>
